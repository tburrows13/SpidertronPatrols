[tips-and-tricks-item-description]
sp-spidertron-patrols=Przegląd głównych funkcji dodanych przez mod [font=default-bold]Spidertron Patrols[/font].\n\nJeśli interfejs harmonogramu nie mieści się na ekranie, rozważ zmniejszenie [font=default-semibold]Rozmiaru interfejsu[/font] lub wyłączenie opcji [font=default-semibold]Spłaszcz interfejs postaci[/font] w Ustawienia > Interfejs.
sp-dock=[entity=sp-spidertron-dock] pozwala na zautomatyzowany załadunek i rozładunek Spidertronów przy pomocy podajników.\n\nDok automatycznie łączy się z pierwszym Spidertronem, który się nad nim zatrzyma, i rozłącza się, gdy pojazd odejdzie.
sp-spidertron-automation=Pobierz [item=sp-spidertron-patrol-remote] z panelu po prawej stronie interfejsu Spidertrona lub naciskając __CONTROL__spidertron-enhancements-spidertron-patrol-pipette__ podczas zaznaczania Spidertrona. \nMigająca liczba pokazuje, który punkt nawigacyjny jest aktualnie wybrany. __ALT_CONTROL__2__use-item__ utworzy nowy punkt nawigacyjny po aktualnie wybranym. __ALT_CONTROL__2__sp-replace-previous-waypoint__ przeniesie aktualnie wybrany punkt nawigacyjny na wskazaną pozycję. \nAby wybrać punkt do wstawienia (po nim) lub zastąpienia, kliknij przycisk [img=item.sp-spidertron-patrol-remote] w rzędzie tego punktu nawigacyjnego w interfejsie harmonogramu. \n\n__ALT_CONTROL__1__sp-delete-all-waypoints__, aby usunąć wszystkie punkty nawigacyjne. \n__ALT_CONTROL__1__sp-toggle-spidertron-automatic-manual__, aby przełączyć tryb automatyczny/ręczny dla Spidertrona, który jest aktualnie zaznaczony, otwarty, prowadzony lub podłączony do trzymanego pilota.
sp-wait-conditions=Warunki postoju można ustawić dla każdego punktu nawigacyjnego w harmonogramie. Działają one podobnie do warunków postoju pociągów, ale każdy punkt nawigacyjny może mieć tylko jeden taki warunek. Jeśli chcesz połączyć wiele warunków postoju w jednym punkcie nawigacyjnym, możesz ustawić kilka punktów nawigacyjnych na tej samej pozycji, ale każdy z innym warunkiem. W ostateczności użyj [font=default-semibold]Warunku sieci sterowniczej[/font] i podłącz sterowniki do [entity=sp-spidertron-dock] w miejscu docelowym.
sp-automatic-refueling=Jeśli pojazd wymaga paliwa, użyj warunku postoju [font=default-semibold]Paliwo do pełna[/font], aby zapobiec opuszczeniu punktu nawigacyjnego przed zatankowaniem. Istnieją dwie metody automatycznego tankowania:\n\n- Skonfiguruj [entity=sp-spidertron-dock], aby łączył się z ekwipunkiem paliwowym pojazdu, a następnie tankuj paliwo podajnikami.\n- Bezpośrednio w pojeździe dodaj zamówienie logistyczne na paliwo, które zostanie dostarczone przez [entity=logistic-robot]. Takie paliwo trafi prosto do ekwipunku paliwowego pojazdu. 
sp-aircraft-automation=Samoloty z moda [font=default-bold]Lex's Aircraft[/font] mogą być również automatyzowane przy użyciu [item=sp-spidertron-patrol-remote] oraz [entity=sp-spidertron-dock].
sp-submarine-automation=Łodzie podwodne z moda [font=default-bold]Maraxsis[/font] mogą być również automatyzowane przy użyciu [item=sp-spidertron-patrol-remote] oraz [entity=sp-spidertron-dock].\nUżyj warunku postoju [font=default-semibold]Zanurzenie[/font] w punkcie nawigacyjnym nad rowem oceanicznym, aby do niego wpłynąć lub z niego wypłynąć.


