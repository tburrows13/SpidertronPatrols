sp-remove-military-requirement=Usuwa zbrojeniowe pakiety naukowe [item=military-science-pack] z technologii [font=default-bold]Spiderling[/font] oraz [font=default-bold]Automatyzacja Spidertronów[/font].\nUsuwa wyrzutnię rakiet [item=rocket-launcher] ze [font=default-bold]Spiderlinga[/font].\nZalecane w przypadku gry w trybie pokojowym.
sp-prevent-docking-when-driving=Spidertrony nie będą łączyć się z dokami, gdy gracz nimi kieruje, chyba że pojazd jest w trybie automatycznym.
sp-show-schedule-pane-by-default=Jeśli włączone, nowo postawione Spidertrony po otwarciu będą od razu wyświetlać pełny interfejs harmonogramu.\n(Panel harmonogramu każdego Spidertrona można i tak indywidualnie pokazać lub ukryć za pomocą przycisków w prawym górnym rogu interfejsu).

